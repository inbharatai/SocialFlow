<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SocialFlow - AI Social Media Automation</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #09090b;
            --bg-card: #18181b;
            --bg-elevated: #27272a;
            --border: #3f3f46;
            --border-light: #52525b;
            --text: #fafafa;
            --text-dim: #a1a1aa;
            --text-muted: #71717a;
            
            --accent: #8b5cf6;
            --accent-dim: #7c3aed;
            --accent-glow: rgba(139, 92, 246, 0.4);
            
            --linkedin: #0a66c2;
            --instagram: #e4405f;
            --twitter: #000000;
            
            --success: #22c55e;
            --warning: #eab308;
            --danger: #ef4444;
            
            --radius: 12px;
            --radius-lg: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
        }

        /* Gradient background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse 100% 100% at 0% 0%, rgba(139, 92, 246, 0.08), transparent 50%),
                radial-gradient(ellipse 80% 80% at 100% 100%, rgba(59, 130, 246, 0.06), transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .app { display: flex; min-height: 100vh; }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 8px 12px;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--accent) 0%, #3b82f6 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            box-shadow: 0 8px 24px var(--accent-glow);
        }

        .logo h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 30%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-group { margin-bottom: 28px; }
        
        .nav-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--text-muted);
            padding: 0 12px;
            margin-bottom: 10px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 14px;
            border-radius: var(--radius);
            cursor: pointer;
            color: var(--text-dim);
            transition: all 0.15s ease;
            margin-bottom: 4px;
            font-weight: 500;
        }

        .nav-item:hover {
            background: var(--bg-elevated);
            color: var(--text);
        }

        .nav-item.active {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.15) 0%, rgba(59, 130, 246, 0.1) 100%);
            color: var(--accent);
            border: 1px solid rgba(139, 92, 246, 0.3);
        }

        .nav-icon { font-size: 20px; width: 24px; text-align: center; }

        /* Main Content */
        .main {
            flex: 1;
            margin-left: 280px;
            padding: 32px 40px;
            max-width: 1400px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .page-title {
            font-size: 32px;
            font-weight: 700;
        }

        /* Buttons */
        .btn {
            padding: 12px 24px;
            border-radius: var(--radius);
            border: none;
            font-family: inherit;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.15s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dim) 100%);
            color: white;
            box-shadow: 0 4px 16px var(--accent-glow);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--accent-glow);
        }

        .btn-secondary {
            background: var(--bg-elevated);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .btn-linkedin { background: var(--linkedin); color: white; }
        .btn-instagram { background: var(--instagram); color: white; }
        .btn-twitter { background: var(--twitter); color: white; border: 1px solid var(--border); }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        /* Cards */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 24px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
        }

        .stat-label { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
        .stat-value { font-size: 36px; font-weight: 700; }
        .stat-sub { font-size: 12px; color: var(--success); margin-top: 6px; }

        /* Grid Layout */
        .grid-2 {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 24px;
        }

        /* Form Elements */
        .form-group { margin-bottom: 20px; }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        .form-input, .form-textarea, .form-select {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: inherit;
            font-size: 14px;
            transition: all 0.15s ease;
        }

        .form-input:focus, .form-textarea:focus, .form-select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .form-textarea { min-height: 120px; resize: vertical; }

        /* Platform Pills */
        .platform-pills {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .platform-pill {
            flex: 1;
            padding: 16px 20px;
            border-radius: var(--radius);
            border: 2px solid var(--border);
            background: transparent;
            color: var(--text-dim);
            font-family: inherit;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .platform-pill:hover { border-color: var(--border-light); }

        .platform-pill.active.linkedin {
            border-color: var(--linkedin);
            background: rgba(10, 102, 194, 0.1);
            color: var(--linkedin);
        }

        .platform-pill.active.instagram {
            border-color: var(--instagram);
            background: rgba(228, 64, 95, 0.1);
            color: var(--instagram);
        }

        .platform-pill.active.twitter {
            border-color: var(--text);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
        }

        /* AI Toggle */
        .ai-toggle {
            display: flex;
            background: var(--bg-dark);
            border-radius: var(--radius);
            padding: 4px;
            margin-bottom: 20px;
        }

        .ai-btn {
            flex: 1;
            padding: 12px 16px;
            border: none;
            background: transparent;
            color: var(--text-dim);
            font-family: inherit;
            font-weight: 500;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.15s ease;
        }

        .ai-btn.active {
            background: var(--accent);
            color: white;
        }

        /* Content Type Tabs */
        .content-tabs {
            display: flex;
            gap: 4px;
            background: var(--bg-dark);
            padding: 4px;
            border-radius: var(--radius);
            margin-bottom: 20px;
        }

        .content-tab {
            flex: 1;
            padding: 10px 16px;
            border: none;
            background: transparent;
            color: var(--text-dim);
            font-family: inherit;
            font-weight: 500;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.15s ease;
            font-size: 13px;
        }

        .content-tab.active {
            background: var(--bg-elevated);
            color: var(--text);
        }

        /* Generated Content */
        .generated-content {
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            white-space: pre-wrap;
            font-size: 14px;
            line-height: 1.7;
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        /* Post Item */
        .post-item {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 12px;
            transition: all 0.15s ease;
        }

        .post-item:hover { border-color: var(--border-light); }

        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .post-badges { display: flex; gap: 8px; }

        .badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge.linkedin { background: rgba(10, 102, 194, 0.2); color: var(--linkedin); }
        .badge.instagram { background: rgba(228, 64, 95, 0.2); color: var(--instagram); }
        .badge.twitter { background: rgba(255, 255, 255, 0.1); color: var(--text); }

        .badge.draft { background: rgba(255, 255, 255, 0.1); color: var(--text-dim); }
        .badge.scheduled { background: rgba(139, 92, 246, 0.2); color: var(--accent); }
        .badge.publishing { background: rgba(234, 179, 8, 0.2); color: var(--warning); }
        .badge.published { background: rgba(34, 197, 94, 0.2); color: var(--success); }
        .badge.failed { background: rgba(239, 68, 68, 0.2); color: var(--danger); }

        .post-content {
            font-size: 14px;
            color: var(--text-dim);
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .post-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .post-time { font-size: 12px; color: var(--text-muted); }
        .post-actions { display: flex; gap: 8px; }

        .action-btn {
            padding: 8px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-dim);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .action-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .action-btn.danger:hover {
            background: var(--danger);
            border-color: var(--danger);
        }

        /* Account Item */
        .account-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 16px;
        }

        .account-info { display: flex; align-items: center; gap: 16px; }

        .account-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: white;
        }

        .account-icon.linkedin { background: var(--linkedin); }
        .account-icon.instagram { background: var(--instagram); }
        .account-icon.twitter { background: var(--twitter); border: 1px solid var(--border); }

        .account-name { font-weight: 600; font-size: 15px; }
        .account-status { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
        .account-status.connected { color: var(--success); }

        .account-actions { display: flex; gap: 10px; }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(8px);
        }

        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            width: 90%;
            max-width: 500px;
            padding: 32px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-title { font-size: 22px; font-weight: 700; }

        .modal-close {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: rgba(239, 68, 68, 0.1);
            border-color: var(--danger);
            color: var(--danger);
        }

        /* Loading Spinner */
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px;
            color: var(--text-muted);
            gap: 16px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-icon { font-size: 48px; margin-bottom: 16px; }

        /* Responsive */
        @media (max-width: 1024px) {
            .grid-2 { grid-template-columns: 1fr; }
        }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main { margin-left: 0; padding: 20px; }
            .platform-pills { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const API = 'http://localhost:8000/api';

        // API helper
        const api = {
            get: async (url) => (await fetch(`${API}${url}`)).json(),
            post: async (url, data) => (await fetch(`${API}${url}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })).json(),
            delete: async (url) => (await fetch(`${API}${url}`, { method: 'DELETE' })).json()
        };

        // Platform icons
        const icons = {
            linkedin: '💼',
            instagram: '📸',
            twitter: '𝕏',
            dashboard: '📊',
            create: '✨',
            posts: '📝',
            schedule: '📅',
            accounts: '🔐',
            settings: '⚙️'
        };

        // Sidebar Component
        function Sidebar({ active, onChange }) {
            const navItems = [
                { id: 'dashboard', icon: icons.dashboard, label: 'Dashboard' },
                { id: 'create', icon: icons.create, label: 'Create Content' },
                { id: 'carousel', icon: '🎠', label: 'Carousel Maker' },
                { id: 'video', icon: '🎬', label: 'Video/Reel Maker' },
                { id: 'avatar', icon: '🧑‍💼', label: 'Avatar Videos' },
                { id: 'posts', icon: icons.posts, label: 'All Posts' },
                { id: 'accounts', icon: icons.accounts, label: 'Accounts' },
            ];

            return (
                <aside className="sidebar">
                    <div className="logo">
                        <div className="logo-icon">⚡</div>
                        <h1>SocialFlow</h1>
                    </div>
                    
                    <nav className="nav-group">
                        <div className="nav-label">Menu</div>
                        {navItems.map(item => (
                            <div 
                                key={item.id}
                                className={`nav-item ${active === item.id ? 'active' : ''}`}
                                onClick={() => onChange(item.id)}
                            >
                                <span className="nav-icon">{item.icon}</span>
                                {item.label}
                            </div>
                        ))}
                    </nav>
                    
                    <div style={{ marginTop: 'auto', padding: '16px', borderTop: '1px solid var(--border)' }}>
                        <div style={{ fontSize: '12px', color: 'var(--text-muted)' }}>
                            🔒 Your credentials are encrypted locally
                        </div>
                    </div>
                </aside>
            );
        }

        // Dashboard
        function Dashboard({ posts, accounts }) {
            const stats = {
                total: posts.length,
                scheduled: posts.filter(p => p.status === 'scheduled').length,
                published: posts.filter(p => p.status === 'published').length,
                drafts: posts.filter(p => p.status === 'draft').length
            };

            return (
                <div>
                    <div className="header">
                        <h1 className="page-title">Dashboard</h1>
                    </div>
                    
                    <div className="stats-grid">
                        <div className="stat-card">
                            <div className="stat-label">Total Posts</div>
                            <div className="stat-value">{stats.total}</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-label">Scheduled</div>
                            <div className="stat-value">{stats.scheduled}</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-label">Published</div>
                            <div className="stat-value">{stats.published}</div>
                            <div className="stat-sub">✓ Ready to grow</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-label">Connected</div>
                            <div className="stat-value">{accounts.filter(a => a.is_logged_in).length}/3</div>
                        </div>
                    </div>

                    <div className="grid-2">
                        <div className="card">
                            <div className="card-title">📝 Recent Posts</div>
                            {posts.slice(0, 5).map(post => (
                                <PostItem key={post.id} post={post} compact />
                            ))}
                            {posts.length === 0 && (
                                <div className="empty-state">
                                    <div className="empty-icon">✨</div>
                                    <p>No posts yet. Create your first one!</p>
                                </div>
                            )}
                        </div>

                        <div className="card">
                            <div className="card-title">🔗 Accounts</div>
                            {['linkedin', 'instagram', 'twitter'].map(platform => {
                                const account = accounts.find(a => a.platform === platform);
                                return (
                                    <div key={platform} className="account-item" style={{ padding: '14px' }}>
                                        <div className="account-info">
                                            <div className={`account-icon ${platform}`}>{icons[platform]}</div>
                                            <div>
                                                <div className="account-name" style={{ textTransform: 'capitalize' }}>{platform === 'twitter' ? 'X (Twitter)' : platform}</div>
                                                <div className={`account-status ${account?.is_logged_in ? 'connected' : ''}`}>
                                                    {account?.is_logged_in ? '● Connected' : '○ Not connected'}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        }

        // Create Content
        function CreateContent({ onCreated, accounts }) {
            const [platform, setPlatform] = useState('linkedin');
            const [contentType, setContentType] = useState('post');
            const [topic, setTopic] = useState('');
            const [instructions, setInstructions] = useState('');
            const [slides, setSlides] = useState(5);
            const [generated, setGenerated] = useState('');
            const [loading, setLoading] = useState(false);
            const [scheduleTime, setScheduleTime] = useState('');

            const generate = async () => {
                if (!topic) return;
                setLoading(true);
                try {
                    const result = await api.post('/generate', {
                        topic,
                        platform,
                        content_type: contentType,
                        slides,
                        custom_instructions: instructions
                    });
                    setGenerated(result.content);
                } catch (err) {
                    alert('Generation failed. Make sure your OpenAI API key is set in .env');
                }
                setLoading(false);
            };

            const save = async (publish = false) => {
                if (!generated) return;
                
                const account = accounts.find(a => a.platform === platform);
                if (publish && !account?.is_logged_in) {
                    alert(`Please connect your ${platform} account first!`);
                    return;
                }

                const post = await api.post('/posts', {
                    platform,
                    content_type: contentType,
                    content: generated,
                    scheduled_time: scheduleTime || null
                });

                if (publish && post.id) {
                    await api.post(`/posts/${post.id}/publish`);
                }

                alert(publish ? 'Publishing...' : 'Saved as draft!');
                setGenerated('');
                setTopic('');
                onCreated();
            };

            return (
                <div>
                    <div className="header">
                        <h1 className="page-title">Create Content</h1>
                    </div>

                    <div className="grid-2">
                        <div className="card">
                            <div className="card-title">✨ AI Content Generator</div>

                            <div className="form-label">Platform</div>
                            <div className="platform-pills">
                                {['linkedin', 'instagram', 'twitter'].map(p => (
                                    <button
                                        key={p}
                                        className={`platform-pill ${platform === p ? `active ${p}` : ''}`}

            const generateReel = async () => {

                    const res = await api.post('/generate-reel', {
                        topic,
                        style,
                        duration,
                        platform,
                        custom_instructions: instructions
                    });

                    if (res.success) {
                        setResult(res.reel);
                        // Start polling for video status
                        if (res.reel.video_task_id) {
                            pollVideoStatus(res.reel.video_task_id);

                    } else {
                        alert('Failed: ' + (res.error || 'Unknown error'));
                    }
                } catch (err) {
                    alert('Generation failed. Check your API keys.');

                setLoading(false);
            };

            const generateVideo = async () => {
                if (!prompt) return;
                setLoading(true);
                setResult(null);
                setVideoStatus(null);

                try {
                    const res = await api.post('/generate-video', {
                        prompt,
                        video_type: mode,
                        duration,
                        aspect_ratio: aspectRatio,
                        mode: 'std',
                        platform
                    });

                    if (res.success) {
                        setResult({ video_task_id: res.task_id });
                        pollVideoStatus(res.task_id);
                    } else {
                        alert('Failed: ' + (res.error || 'Unknown error'));
                    }
                } catch (err) {
                    alert('Generation failed. Check your Kling API key.');
                }
                setLoading(false);
            };

            const pollVideoStatus = async (taskId) => {
                setPolling(true);
                const maxAttempts = 60; // 5 minutes max
                let attempts = 0;

                const poll = async () => {
                    try {
                        const res = await api.get(`/video-status/${taskId}`);
                        setVideoStatus(res);

                        if (res.status === 'completed' || res.status === 'success') {
                            setPolling(false);
                            return;
                        } else if (res.status === 'failed' || res.status === 'error') {
                            setPolling(false);
                            return;
                        }

                        attempts++;
                        if (attempts < maxAttempts) {
                            setTimeout(poll, 5000); // Poll every 5 seconds
                        } else {
                            setPolling(false);
                        }
                    } catch (err) {
                        setPolling(false);
                    }
                };

                poll();
            };

                                        <button className={`platform-pill ${platform === 'instagram' ? 'active instagram' : ''}`} onClick={() => setPlatform('instagram')}>
                                            📸 Instagram
                                        </button>

                                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '8px', marginBottom: '20px' }}>
                                        {styles.map(s => (
                                            <button key={s.id} onClick={() => setStyle(s.id)} style={{
                                                padding: '10px', borderRadius: '8px', cursor: 'pointer', textAlign: 'left',
                                                border: style === s.id ? '2px solid var(--accent)' : '1px solid var(--border)',
                                                background: style === s.id ? 'rgba(139,92,246,0.1)' : 'transparent', color: 'var(--text)'
                                            }}>
                                                <div style={{ fontWeight: '600', fontSize: '13px' }}>{s.label}</div>

            const [result, setResult] = useState(null);
            const [videoStatus, setVideoStatus] = useState(null);
            const [polling, setPolling] = useState(false);

            const voices = [
                { id: 'en_female_1', label: '👩 Female (English)' },
                { id: 'en_male_1', label: '👨 Male (English)' },
                { id: 'en_female_2', label: '👩‍💼 Professional Female' },
                { id: 'en_male_2', label: '👨‍💼 Professional Male' },
            ];

            const tones = [
                { id: 'professional', label: '💼 Professional' },
                { id: 'casual', label: '😊 Casual' },
                { id: 'enthusiastic', label: '🔥 Enthusiastic' },
                { id: 'educational', label: '📚 Educational' },
            ];

            const uploadPhoto = async (file) => {
                const formData = new FormData();
                formData.append('file', file);
                
                const response = await fetch('http://localhost:8000/api/upload-avatar-photo', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                if (data.success) {
                    setPhotoUrl(data.full_url);
                    return data.full_url;
                }
                throw new Error('Upload failed');
            };

            const handlePhotoSelect = async (e) => {
                const file = e.target.files[0];
                if (file) {
                    setPhoto(file);
                    setPhotoPreview(URL.createObjectURL(file));
                    
                    try {
                        setLoading(true);
                        await uploadPhoto(file);
                        setStep(2);
                    } catch (err) {
                        alert('Failed to upload photo');
                    }
                    setLoading(false);
                }
            };

            const generateScript = async () => {
                if (!topic) return;
                setLoading(true);
                
                try {
                    const res = await api.post('/generate-avatar-with-script', {
                        topic,
                        duration: 30,
                        tone,
                        platform: 'instagram'
                    });
                    
                    if (res.success) {
                        setScript(res.script);
                    } else {
                        alert('Failed to generate script');
                    }
                } catch (err) {
                    alert('Script generation failed');
                }
                setLoading(false);
            };

            const uploadAudio = async (file) => {
                const formData = new FormData();
                formData.append('file', file);
                
                const response = await fetch('http://localhost:8000/api/upload-audio', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                if (data.success) {
                    setAudioUrl(data.full_url);
                    return data.full_url;
                }
                throw new Error('Upload failed');
            };

            const handleAudioSelect = async (e) => {
                const file = e.target.files[0];
                if (file) {
                    setAudioFile(file);
                    try {
                        await uploadAudio(file);
                    } catch (err) {
                        alert('Failed to upload audio');
                    }
                }
            };

            const generateAvatar = async () => {
                if (!photoUrl) {
                    alert('Please upload your photo first');
                    return;
                }
                
                if (scriptMode !== 'upload_audio' && !script) {
                    alert('Please add a script or upload audio');
                    return;
                }

                setLoading(true);
                setResult(null);
                setVideoStatus(null);

                try {
                    const payload = {
                        image_url: photoUrl,
                        prompt: 'speaking naturally with a friendly, professional expression, slight head movements',
                        mode: 'std'
                    };

                    if (scriptMode === 'upload_audio' && audioUrl) {
                        payload.audio_url = audioUrl;
                    } else {
                        payload.text = script;
                        payload.voice_id = voiceId;
                    }

                    const res = await api.post('/generate-avatar', payload);

                    if (res.success) {
                        setResult(res);
                        pollVideoStatus(res.task_id);
                    } else {
                        alert('Failed: ' + (res.error || 'Unknown error'));
                    }
                } catch (err) {
                    alert('Avatar generation failed. Check your Kling API key.');
                }
                setLoading(false);
            };

            const pollVideoStatus = async (taskId) => {
                setPolling(true);
                const maxAttempts = 60;
                let attempts = 0;

                const poll = async () => {
                    try {
                        const res = await api.get(`/video-status/${taskId}`);
                        setVideoStatus(res);

                        if (res.status === 'completed' || res.status === 'success' || res.video_url) {
                            setPolling(false);
                            return;
                        } else if (res.status === 'failed' || res.status === 'error') {
                            setPolling(false);
                            return;
                        }

                        attempts++;
                        if (attempts < maxAttempts) {
                            setTimeout(poll, 5000);
                        } else {
                            setPolling(false);
                        }
                    } catch (err) {
                        setPolling(false);
                    }
                };

                poll();
            };

            return (
                <div>
                    <div className="header">
                        <h1 className="page-title">🧑‍💼 Avatar Videos</h1>
                    </div>

                    <div className="grid-2">
                        <div className="card">
                            <div className="card-title">✨ Create Your Talking Avatar</div>
                            <p style={{ color: 'var(--text-muted)', marginBottom: '20px', fontSize: '13px' }}>
                                Upload your photo → Add script → Get video of YOU talking!
                            </p>

                            {/* Step 1: Upload Photo */}
                            <div style={{ marginBottom: '24px', padding: '16px', background: step >= 1 ? 'rgba(139,92,246,0.1)' : 'var(--bg-dark)', borderRadius: '12px', border: step === 1 ? '2px solid var(--accent)' : '1px solid var(--border)' }}>
                                <div style={{ fontWeight: '600', marginBottom: '12px' }}>📸 Step 1: Your Photo</div>
                                
                                {photoPreview ? (
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '16px' }}>
                                        <img src={photoPreview} alt="Your photo" style={{ width: '80px', height: '80px', borderRadius: '12px', objectFit: 'cover' }} />
                                        <div>
                                            <p style={{ color: 'var(--success)', fontSize: '13px' }}>✅ Photo uploaded</p>
                                            <button onClick={() => { setPhoto(null); setPhotoPreview(null); setPhotoUrl(''); setStep(1); }} style={{ fontSize: '12px', color: 'var(--text-muted)', background: 'none', border: 'none', cursor: 'pointer', textDecoration: 'underline' }}>Change photo</button>
                                        </div>
                                    </div>
                                ) : (
                                    <div>
                                        <input type="file" accept="image/*" onChange={handlePhotoSelect} style={{ display: 'none' }} id="photo-upload" />
                                        <label htmlFor="photo-upload" className="btn btn-secondary" style={{ cursor: 'pointer', display: 'inline-flex' }}>
                                            📤 Upload Your Photo
                                        </label>
                                        <p style={{ fontSize: '11px', color: 'var(--text-muted)', marginTop: '8px' }}>
                                            Best: Front-facing, well-lit headshot
                                        </p>
                                    </div>
                                )}
                            </div>

                            {/* Step 2: Script */}
                            <div style={{ marginBottom: '24px', padding: '16px', background: step >= 2 ? 'rgba(139,92,246,0.1)' : 'var(--bg-dark)', borderRadius: '12px', border: step === 2 ? '2px solid var(--accent)' : '1px solid var(--border)', opacity: step < 2 ? 0.5 : 1 }}>
                                <div style={{ fontWeight: '600', marginBottom: '12px' }}>🎙️ Step 2: What Should You Say?</div>
                                
                                <div style={{ display: 'flex', gap: '8px', marginBottom: '16px' }}>
                                    {[['generate', '✨ AI Generate'], ['write', '✍️ Write Script'], ['upload_audio', '🎤 Upload Audio']].map(([id, label]) => (
                                        <button key={id} onClick={() => setScriptMode(id)} disabled={step < 2} style={{
                                            flex: 1, padding: '8px', borderRadius: '8px', fontSize: '11px', cursor: 'pointer',
                                            border: scriptMode === id ? '2px solid var(--accent)' : '1px solid var(--border)',
                                            background: scriptMode === id ? 'rgba(139,92,246,0.2)' : 'transparent', color: 'var(--text)'
                                        }}>
                                            {label}
                                        </button>
                                    ))}
                                </div>

                                {scriptMode === 'generate' && (
                                    <div>
                                        <input type="text" className="form-input" placeholder="Topic: e.g., 3 tips for productivity" value={topic} onChange={e => setTopic(e.target.value)} disabled={step < 2} style={{ marginBottom: '12px' }} />
                                        
                                        <div style={{ display: 'flex', gap: '8px', marginBottom: '12px' }}>
                                            {tones.map(t => (
                                                <button key={t.id} onClick={() => setTone(t.id)} disabled={step < 2} style={{
                                                    flex: 1, padding: '6px', borderRadius: '6px', fontSize: '10px',
                                                    border: tone === t.id ? '2px solid var(--accent)' : '1px solid var(--border)',
                                                    background: tone === t.id ? 'rgba(139,92,246,0.1)' : 'transparent', color: 'var(--text)', cursor: 'pointer'
                                                }}>
                                                    {t.label}
                                                </button>
                                            ))}
                                        </div>

                                        <button className="btn btn-secondary" onClick={generateScript} disabled={loading || !topic || step < 2} style={{ width: '100%' }}>
                                            {loading ? <><div className="spinner" /> Generating...</> : '✨ Generate Script'}
                                        </button>
                                    </div>
                                )}

                                {(scriptMode === 'generate' || scriptMode === 'write') && (
                                    <div style={{ marginTop: '12px' }}>
                                        <textarea className="form-textarea" placeholder="Your script... (what you'll say in the video)" value={script} onChange={e => setScript(e.target.value)} disabled={step < 2} style={{ minHeight: '100px' }} />
                                    </div>
                                )}

                                {scriptMode === 'upload_audio' && (
                                    <div>
                                        <input type="file" accept="audio/*" onChange={handleAudioSelect} style={{ display: 'none' }} id="audio-upload" />
                                        <label htmlFor="audio-upload" className="btn btn-secondary" style={{ cursor: 'pointer', display: 'inline-flex', width: '100%', justifyContent: 'center' }}>
                                            🎤 {audioFile ? audioFile.name : 'Upload Your Voice Recording'}
                                        </label>
                                        {audioUrl && <p style={{ color: 'var(--success)', fontSize: '12px', marginTop: '8px' }}>✅ Audio uploaded</p>}
                                    </div>
                                )}

                                {scriptMode !== 'upload_audio' && script && (
                                    <div style={{ marginTop: '12px' }}>
                                        <div style={{ fontSize: '12px', color: 'var(--text-muted)', marginBottom: '8px' }}>Voice:</div>
                                        <div style={{ display: 'flex', gap: '6px', flexWrap: 'wrap' }}>
                                            {voices.map(v => (
                                                <button key={v.id} onClick={() => setVoiceId(v.id)} style={{
                                                    padding: '6px 10px', borderRadius: '6px', fontSize: '11px',
                                                    border: voiceId === v.id ? '2px solid var(--accent)' : '1px solid var(--border)',
                                                    background: voiceId === v.id ? 'rgba(139,92,246,0.1)' : 'transparent', color: 'var(--text)', cursor: 'pointer'
                                                }}>
                                                    {v.label}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>

                            {/* Step 3: Generate */}
                            <button className="btn btn-primary" onClick={generateAvatar} disabled={loading || !photoUrl || (scriptMode !== 'upload_audio' && !script) || (scriptMode === 'upload_audio' && !audioUrl)} style={{ width: '100%' }}>
                                {loading ? <><div className="spinner" /> Creating Avatar Video...</> : '🎬 Generate Avatar Video (~$0.10)'}
                            </button>
                        </div>

                        <div className="card">
                            <div className="card-title">📱 Preview</div>

                            {result || polling ? (
                                <div>
                                    {photoPreview && (
                                        <div style={{ marginBottom: '16px', textAlign: 'center' }}>
                                            <img src={photoPreview} alt="Your avatar" style={{ width: '120px', height: '120px', borderRadius: '50%', objectFit: 'cover', border: '3px solid var(--accent)' }} />
                                        </div>
                                    )}

                                    <div style={{ background: 'var(--bg-dark)', padding: '16px', borderRadius: '12px' }}>
                                        {polling ? (
                                            <div style={{ textAlign: 'center' }}>
                                                <div className="spinner" style={{ margin: '0 auto 12px' }} />
                                                <p>Creating your avatar video...</p>
                                                <p style={{ fontSize: '12px', color: 'var(--text-muted)' }}>This takes 1-3 minutes</p>
                                            </div>
                                        ) : videoStatus?.video_url ? (
                                            <div>
                                                <p style={{ color: 'var(--success)', marginBottom: '12px', textAlign: 'center' }}>✅ Avatar Ready!</p>
                                                <video src={videoStatus.video_url} controls style={{ width: '100%', borderRadius: '12px' }} />
                                            </div>
                                        ) : videoStatus?.status === 'failed' ? (
                                            <p style={{ color: 'var(--danger)', textAlign: 'center' }}>❌ Generation failed. Try again.</p>
                                        ) : (
                                            <p style={{ color: 'var(--text-muted)', textAlign: 'center' }}>Processing...</p>
                                        )}
                                    </div>
                                </div>
                            ) : (
                                <div className="empty-state">
                                    <div className="empty-icon">🧑‍💼</div>
                                    <p>Your avatar video will appear here</p>
                                    <p style={{ fontSize: '12px', marginTop: '8px', color: 'var(--text-muted)' }}>
                                        Upload your photo to get started
                                    </p>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // Accounts Page
        function Accounts({ accounts, onRefresh }) {
            const [modal, setModal] = useState(null);
            const [form, setForm] = useState({ username: '', password: '' });
            const [loading, setLoading] = useState(false);

            const saveAccount = async () => {
                if (!form.username || !form.password) return;
                setLoading(true);
                await api.post('/accounts', {
                    platform: modal,
                    username: form.username,
                    password: form.password
                });
                setModal(null);
                setForm({ username: '', password: '' });
                setLoading(false);
                onRefresh();
            };

            const login = async (platform) => {
                setLoading(true);
                const result = await api.post(`/accounts/${platform}/login`);
                alert(result.message);
                setLoading(false);
                onRefresh();
            };

            const remove = async (platform) => {
                if (confirm(`Disconnect ${platform}?`)) {
                    await api.delete(`/accounts/${platform}`);
                    onRefresh();
                }
            };

            const platforms = [
                { id: 'linkedin', name: 'LinkedIn', desc: 'Professional network' },
                { id: 'instagram', name: 'Instagram', desc: 'Photo & video sharing' },
                { id: 'twitter', name: 'X (Twitter)', desc: 'Real-time updates' }
            ];

            return (
                <div>
                    <div className="header">
                        <h1 className="page-title">Connected Accounts</h1>
                    </div>

                    <div className="card">
                        <div className="card-title">🔐 Your Social Media Accounts</div>
                        <p style={{ color: 'var(--text-muted)', marginBottom: '24px', fontSize: '14px' }}>
                            Add your credentials to enable automated posting. All passwords are encrypted locally.
                        </p>

                        {platforms.map(p => {
                            const account = accounts.find(a => a.platform === p.id);
                            return (
                                <div key={p.id} className="account-item">
                                    <div className="account-info">
                                        <div className={`account-icon ${p.id}`}>{icons[p.id]}</div>
                                        <div>
                                            <div className="account-name">{p.name}</div>
                                            <div className={`account-status ${account?.is_logged_in ? 'connected' : ''}`}>
                                                {account ? (account.is_logged_in ? `● ${account.username}` : `○ ${account.username} (not logged in)`) : p.desc}
                                            </div>
                                        </div>
                                    </div>
                                    <div className="account-actions">
                                        {account ? (
                                            <>
                                                {!account.is_logged_in && (
                                                    <button className="btn btn-primary" onClick={() => login(p.id)} disabled={loading}>
                                                        {loading ? <div className="spinner" /> : '🔓 Login'}
                                                    </button>
                                                )}
                                                <button className="btn btn-danger" onClick={() => remove(p.id)}>Remove</button>
                                            </>
                                        ) : (
                                            <button className={`btn btn-${p.id}`} onClick={() => setModal(p.id)}>
                                                + Add Account
                                            </button>
                                        )}
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    <div className="card">
                        <div className="card-title">💡 How It Works</div>
                        <div style={{ color: 'var(--text-dim)', lineHeight: '1.8', fontSize: '14px' }}>
                            <p><strong>1. Add your credentials</strong> - Your password is encrypted and stored locally</p>
                            <p><strong>2. Click Login</strong> - A browser window opens for you to complete login</p>
                            <p><strong>3. Handle any verification</strong> - Complete 2FA or security checks if prompted</p>
                            <p><strong>4. You're connected!</strong> - The session is saved for automated posting</p>
                            <br />
                            <p style={{ color: 'var(--text-muted)' }}>
                                ⚠️ Note: Some platforms may require re-login periodically for security reasons.
                            </p>
                        </div>
                    </div>

                    {/* Add Account Modal */}
                    {modal && (
                        <div className="modal-overlay" onClick={() => setModal(null)}>
                            <div className="modal" onClick={e => e.stopPropagation()}>
                                <div className="modal-header">
                                    <h2 className="modal-title">Add {modal.charAt(0).toUpperCase() + modal.slice(1)} Account</h2>
                                    <button className="modal-close" onClick={() => setModal(null)}>✕</button>
                                </div>

                                <div className="form-group">
                                    <label className="form-label">
                                        {modal === 'twitter' ? 'Username or Email' : modal === 'instagram' ? 'Username' : 'Email'}
                                    </label>
                                    <input
                                        type="text"
                                        className="form-input"
                                        value={form.username}
                                        onChange={e => setForm({ ...form, username: e.target.value })}
                                        placeholder={modal === 'linkedin' ? 'email@example.com' : '@username'}
                                    />
                                </div>

                                <div className="form-group">
                                    <label className="form-label">Password</label>
                                    <input
                                        type="password"
                                        className="form-input"
                                        value={form.password}
                                        onChange={e => setForm({ ...form, password: e.target.value })}
                                    />
                                </div>

                                <div style={{ display: 'flex', gap: '12px', marginTop: '24px' }}>
                                    <button className="btn btn-secondary" onClick={() => setModal(null)}>Cancel</button>
                                    <button className="btn btn-primary" onClick={saveAccount} disabled={loading}>
                                        {loading ? <div className="spinner" /> : '🔒 Save & Login'}
                                    </button>
                                </div>

                                <p style={{ marginTop: '16px', fontSize: '12px', color: 'var(--text-muted)' }}>
                                    🔐 Your password is encrypted with AES-256 and stored only on your machine.
                                </p>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // Main App
        function App() {
            const [tab, setTab] = useState('dashboard');
            const [posts, setPosts] = useState([]);
            const [accounts, setAccounts] = useState([]);
            const [loading, setLoading] = useState(true);

            const load = async () => {
                try {
                    const [postsRes, accountsRes] = await Promise.all([
                        api.get('/posts'),
                        api.get('/accounts')
                    ]);
                    setPosts(postsRes.posts || []);
                    setAccounts(accountsRes.accounts || []);
                } catch (err) {
                    console.error('Failed to load:', err);
                }
                setLoading(false);
            };

            useEffect(() => { load(); }, []);

            const deletePost = async (id) => {
                if (confirm('Delete this post?')) {
                    await api.delete(`/posts/${id}`);
                    load();
                }
            };

            const publishPost = async (id) => {
                await api.post(`/posts/${id}/publish`);
                load();
            };

            if (loading) {
                return (
                    <div className="loading-center" style={{ height: '100vh' }}>
                        <div className="spinner" style={{ width: '40px', height: '40px' }} />
                        <p>Loading SocialFlow...</p>
                    </div>
                );
            }

            return (
                <div className="app">
                    <Sidebar active={tab} onChange={setTab} />
                    <main className="main">
                        {tab === 'dashboard' && <Dashboard posts={posts} accounts={accounts} />}
                        {tab === 'create' && <CreateContent onCreated={load} accounts={accounts} />}
                        {tab === 'carousel' && <CarouselMaker onCreated={load} />}
                        {tab === 'video' && <VideoMaker onCreated={load} />}
                        {tab === 'avatar' && <AvatarMaker onCreated={load} />}
                        {tab === 'posts' && <PostsList posts={posts} onDelete={deletePost} onPublish={publishPost} />}
                        {tab === 'accounts' && <Accounts accounts={accounts} onRefresh={load} />}
                    </main>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
